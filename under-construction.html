<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Construcción | Cal La Pastora</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/icon-300x300.webp">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .maintenance-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 48, 37, 0.9), rgba(0, 48, 37, 0.9)), url('https://images.unsplash.com/photo-1540915637213-90d1f70a1a06?auto=format&fit=crop&q=80&w=2000') center/cover;
            color: white;
            text-align: center;
            padding: 2rem;
        }

        .maintenance-card {
            background: var(--bg-white);
            padding: 4rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 100%;
            border-top: 6px solid var(--primary);
        }

        .maintenance-card h1 {
            color: var(--primary-dark);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .maintenance-card p {
            color: var(--text-dark);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .maintenance-card {
                padding: 2rem 1.5rem;
            }

            .maintenance-card h1 {
                font-size: 1.8rem;
            }

            .maintenance-card p {
                font-size: 1rem;
            }

            .maintenance-wrapper {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="maintenance-wrapper fade-in visible">
        <div class="maintenance-card">
            <!-- Icono industrial o logo -->
            <div style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;">⚙️</div>
            <h1>SITIO EN CONSTRUCCIÓN</h1>
            <p>Estamos actualizando nuestra plataforma técnica para brindarte un mejor servicio. Por favor, vuelve a
                intentar en unos minutos.</p>

            <div
                style="background: var(--bg-light); padding: 1.5rem; border-radius: 8px; margin-top: 2rem; border: 1px solid #eaeaea;">
                <h3
                    style="font-size: 1rem; color: var(--text-dark); margin-bottom: 0.5rem; font-family: 'Inter', sans-serif;">
                    ¿Necesitas atención urgente?</h3>
                <p style="font-size: 0.95rem; margin-bottom: 1rem;">Comunícate directamente con nuestro equipo de
                    ventas:</p>
                <a href="mailto:callapastora14@gmail.com" class="btn btn-primary"
                    style="display: block; margin-bottom: 0.5rem; white-space: normal; word-wrap: break-word; text-transform: none;">📥
                    callapastora14@gmail.com</a>
                <a href="https://wa.me/123456789" class="btn btn-dark"
                    style="display: block; background: #25D366; border-color: #25D366;">📞 (+58) 416-6337475</a>
            </div>
        </div>
    </div>

</body>

</html>
