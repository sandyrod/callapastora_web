server {
    listen       80;
    server_name  localhost;

    # Directorio de los estáticos
    root   /usr/share/nginx/html;
    index  index.html;

    # Regla principal para URLs amigables
    location / {
        # Si la URL falla, intenta buscar la carpeta, luego suma '.html' al nombre
        try_files $uri $uri/ $uri.html =404;
    }

    # Redirigir siempre .html explícito a la versión limpia (SEO y consistencia)
    # Por ejemplo, /nosotros.html -> /nosotros
    if ($request_uri ~ ^/(.*)\.html(\?.*)?$) {
        return 301 /$1$2;
    }

    # Caché básico para archivos estáticos (optimización)
    location ~* \.(css|js|jpg|jpeg|png|webp|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Página de error por defecto
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
